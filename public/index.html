<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f6f0e4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Uncle Miki">
<meta name="description" content="Uncle Miki on call — tell him when and where, he'll swing by.">
<title>Uncle Miki — on call</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="/styles.css">
</head>
<body>

  <!-- Family-code gate (shown only if required) -->
  <section id="gate" class="gate" hidden>
    <div class="gate-card">
      <p class="eyebrow">Uncle duty</p>
      <h1 class="title">Uncle <em>Miki</em></h1>
      <p class="tagline">Family only. Drop the code.</p>
      <form id="gateForm" class="gate-form" novalidate>
        <label for="gateCode" class="sr-only">Family code</label>
        <input
          id="gateCode"
          name="gateCode"
          type="text"
          inputmode="text"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          placeholder="family code"
          required>
        <button type="submit" class="cta cta-compact" id="gateSubmit">
          <span class="cta-label">Enter</span>
          <span class="cta-arrow" aria-hidden="true">→</span>
        </button>
        <p class="fine" id="gateError" role="alert" hidden></p>
      </form>
    </div>
  </section>

  <main class="shell" id="shell" hidden>

    <header class="hero">
      <div class="mark" aria-hidden="true">
        <span class="mark-line"></span>
        <span class="mark-dot"></span>
        <span class="mark-line"></span>
      </div>
      <p class="eyebrow">Uncle duty</p>
      <h1 class="title">Uncle <em>Miki</em></h1>
      <p class="tagline">Tell me when and where. I got you.</p>
    </header>

    <form id="booking" class="form" novalidate>

      <div class="field">
        <label for="passengerName">Who needs a ride?</label>
        <input
          id="passengerName"
          name="passengerName"
          type="text"
          autocomplete="name"
          placeholder="e.g. Nadia"
          maxlength="80">
        <p class="hint">So I know who I'm picking up.</p>
      </div>

      <div class="field">
        <label for="whenLocal">When should I swing by?</label>
        <input
          id="whenLocal"
          name="whenLocal"
          type="datetime-local"
          required
          autocomplete="off">
        <p class="hint" id="whenHint">Pick a day and time.</p>
      </div>

      <div class="field field-ac">
        <label for="startAddress">Where do I grab you?</label>
        <input
          id="startAddress"
          name="startAddress"
          type="text"
          inputmode="text"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          role="combobox"
          aria-autocomplete="list"
          aria-expanded="false"
          aria-controls="startAddress-suggestions"
          required
          placeholder="Home, school, wherever"
          maxlength="240">
        <ul id="startAddress-suggestions" class="ac-list" role="listbox" hidden></ul>
      </div>

      <div class="field field-ac">
        <label for="endAddress">Where we headed?</label>
        <input
          id="endAddress"
          name="endAddress"
          type="text"
          inputmode="text"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          role="combobox"
          aria-autocomplete="list"
          aria-expanded="false"
          aria-controls="endAddress-suggestions"
          required
          placeholder="Practice, airport, the mall…"
          maxlength="240">
        <ul id="endAddress-suggestions" class="ac-list" role="listbox" hidden></ul>
      </div>

      <div class="field">
        <label for="notes">Anything I should know? <span class="meta">(optional)</span></label>
        <textarea
          id="notes"
          name="notes"
          rows="3"
          maxlength="600"
          placeholder="Bags, stops, music on the way…"></textarea>
      </div>

      <button type="submit" class="cta" id="submitBtn">
        <span class="cta-label">Send it to Uncle Miki</span>
        <span class="cta-arrow" aria-hidden="true">→</span>
      </button>

      <p class="fine" id="formError" role="alert" hidden></p>
    </form>

    <section id="success" class="success" hidden>
      <div class="success-badge" aria-hidden="true">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="2"/>
          <path d="M15 24.5l6.5 6.5L33 19.5" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2 class="success-title">Got it. I'll be there.</h2>
      <p class="success-sub" id="successSub"></p>
      <button type="button" class="ghost" id="againBtn">Need another lift?</button>
    </section>

    <footer class="foot">
      <span>Uncle Miki</span>
      <span class="sep">·</span>
      <span>Family first</span>
    </footer>

  </main>

  <script src="/app.js" defer></script>
</body>
</html>
