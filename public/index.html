<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Miki">
<meta name="description" content="Miki Chauffeuring — discreet, on-demand rides. Book in seconds.">
<title>Miki Chauffeuring</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell" id="shell">

    <header class="hero">
      <div class="mark" aria-hidden="true">
        <span class="mark-line"></span>
        <span class="mark-dot"></span>
        <span class="mark-line"></span>
      </div>
      <h1 class="title">Miki<span class="title-amp">&middot;</span>Chauffeuring</h1>
      <p class="tagline">Discreet rides. One tap. Your schedule.</p>
    </header>

    <form id="booking" class="form" novalidate>

      <div class="field">
        <label for="passengerName">Who's riding</label>
        <input
          id="passengerName"
          name="passengerName"
          type="text"
          autocomplete="name"
          placeholder="e.g. Alioune"
          maxlength="80">
        <p class="hint">Optional — shows up on the calendar event.</p>
      </div>

      <div class="field">
        <label for="whenLocal">When to book</label>
        <input
          id="whenLocal"
          name="whenLocal"
          type="datetime-local"
          required
          autocomplete="off">
        <p class="hint" id="whenHint">Pick any date & time.</p>
      </div>

      <div class="field">
        <label for="startAddress">Pickup address</label>
        <input
          id="startAddress"
          name="startAddress"
          type="text"
          inputmode="text"
          autocomplete="street-address"
          required
          placeholder="123 Yonge St, Toronto"
          maxlength="240">
      </div>

      <div class="field">
        <label for="endAddress">Drop-off address</label>
        <input
          id="endAddress"
          name="endAddress"
          type="text"
          inputmode="text"
          autocomplete="off"
          required
          placeholder="Pearson T1"
          maxlength="240">
      </div>

      <div class="field">
        <label for="notes">Notes <span class="meta">(optional)</span></label>
        <textarea
          id="notes"
          name="notes"
          rows="3"
          maxlength="600"
          placeholder="Bags, stops, music, anything Miki should know"></textarea>
      </div>

      <button type="submit" class="cta" id="submitBtn">
        <span class="cta-label">Book Miki</span>
        <span class="cta-arrow" aria-hidden="true">→</span>
      </button>

      <p class="fine" id="formError" role="alert" hidden></p>
    </form>

    <section id="success" class="success" hidden>
      <div class="success-badge" aria-hidden="true">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="2"/>
          <path d="M15 24.5l6.5 6.5L33 19.5" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2 class="success-title">Ride locked in</h2>
      <p class="success-sub" id="successSub"></p>
      <a class="success-link" id="successLink" target="_blank" rel="noopener">
        Open in Google Calendar →
      </a>
      <button type="button" class="ghost" id="againBtn">Book another ride</button>
    </section>

    <footer class="foot">
      <span>Miki Chauffeuring</span>
      <span class="sep">·</span>
      <span>By appointment only</span>
    </footer>

  </main>

  <script src="/app.js" defer></script>
</body>
</html>
