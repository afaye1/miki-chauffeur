<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff2d8"/>
      <stop offset="100%" stop-color="#f6e0b8"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea8a4a"/>
      <stop offset="100%" stop-color="#b4531a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- steering wheel silhouette, friendly -->
  <g transform="translate(256 260)">
    <circle r="150" fill="none" stroke="url(#amber)" stroke-width="18"/>
    <circle r="22" fill="url(#amber)"/>
    <line x1="-150" y1="0" x2="-22" y2="0" stroke="url(#amber)" stroke-width="18" stroke-linecap="round"/>
    <line x1="22" y1="0" x2="150" y2="0" stroke="url(#amber)" stroke-width="18" stroke-linecap="round"/>
    <line x1="0" y1="22" x2="0" y2="150" stroke="url(#amber)" stroke-width="18" stroke-linecap="round"/>
  </g>
  <text x="256" y="100" text-anchor="middle"
        font-family="Georgia, serif" font-style="italic" font-size="58"
        fill="#b4531a">Uncle</text>
  <text x="256" y="470" text-anchor="middle"
        font-family="Georgia, serif" font-size="56" letter-spacing="6"
        fill="#b4531a">MIKI</text>
</svg>
